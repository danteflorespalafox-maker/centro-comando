<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Comando</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161617;
    --bg3: #1e1e20;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e6e0;
    --muted: #6e6c67;
    --accent: #c8a97e;
    --accent2: #7a9e8a;
    --accent3: #9b7fb5;
    --danger: #b56060;
    --r: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ENV BADGE */
  .env-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
  }
  .env-badge.development { color: #7a9e8a; border-color: rgba(122,158,138,0.3); background: rgba(122,158,138,0.08); }
  .env-badge.production  { color: #c8a97e; border-color: rgba(200,169,126,0.3); background: rgba(200,169,126,0.08); }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .logo span { color: var(--accent); font-style: italic; }
  #fecha {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-left: auto;
  }

  main {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto auto;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 62px);
  }

  .panel { background: var(--bg); padding: 28px 32px; }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  input[type="text"], textarea {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  input[type="text"]::placeholder, textarea::placeholder { color: var(--muted); }

  button {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  button:hover { background: var(--bg3); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #1a140a; font-weight: 600; }
  button.primary:hover { opacity: 0.88; }
  button.danger-btn { background: transparent; border: none; color: var(--muted); padding: 4px 6px; font-size: 12px; }
  button.danger-btn:hover { color: var(--danger); background: transparent; }

  /* INBOX */
  #panel-inbox { grid-column: 1; grid-row: 1; }
  .inbox-input-row { display: flex; gap: 8px; margin-bottom: 20px; }
  #inbox-input { flex: 1; }
  .tag-select, .proy-status-sel {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 9px 8px;
    cursor: pointer;
    outline: none;
  }
  .tag-select:focus { border-color: var(--accent); }

  .inbox-list { display: flex; flex-direction: column; gap: 6px; }
  .inbox-item {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; font-size: 14px;
    animation: fadeIn 0.2s ease;
  }
  .inbox-item.procesado { opacity: 0.4; text-decoration: line-through; }
  .inbox-item .ts { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; margin-top: 2px; }
  .inbox-item .text { flex: 1; }
  .inbox-actions { display: flex; gap: 2px; }
  .tag-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
  .tag-dot.idea { background: var(--accent); }
  .tag-dot.tarea { background: var(--accent2); }
  .tag-dot.nota { background: var(--accent3); }

  /* PRIORIDADES */
  #panel-prioridades { grid-column: 1; grid-row: 2; border-top: 1px solid var(--border); }
  .prio-slots { display: flex; flex-direction: column; gap: 8px; }
  .prio-slot {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r); padding: 12px 14px; transition: border-color 0.15s;
  }
  .prio-slot:focus-within { border-color: var(--border2); }
  .prio-num { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--border2); width: 20px; text-align: center; flex-shrink: 0; }
  .prio-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; font-family: 'Instrument Sans', sans-serif; padding: 0; }
  .prio-input:focus { outline: none; }
  .prio-input::placeholder { color: var(--muted); }
  .prio-check {
    width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--border2);
    background: transparent; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s; padding: 0;
  }
  .prio-check.done { background: var(--accent2); border-color: var(--accent2); }
  .prio-check.done::after { content: '✓'; font-size: 10px; color: #0a1a12; }
  .prio-slot.done .prio-input { text-decoration: line-through; color: var(--muted); }

  /* SIDEBAR */
  .sidebar { grid-column: 2; grid-row: 1 / 3; background: var(--bg2); display: flex; flex-direction: column; gap: 1px; }
  .sidebar > div { background: var(--bg2); padding: 24px; }

  .proyecto-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .proyecto-item:last-child { border-bottom: none; }
  .proyecto-nombre { flex: 1; }
  .proy-status { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 20px; }
  .proy-status.activo { background: rgba(122,158,138,0.15); color: var(--accent2); }
  .proy-status.pausa  { background: rgba(155,127,181,0.15); color: var(--accent3); }
  .proy-status.idea   { background: rgba(200,169,126,0.15); color: var(--accent); }

  .add-proy-row { display: flex; gap: 6px; margin-top: 12px; }
  .add-proy-row input { flex: 1; font-size: 13px; padding: 7px 10px; }
  .add-proy-row select { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; color: var(--muted); font-size: 12px; padding: 7px 6px; cursor: pointer; outline: none; }

  #reflexion-text {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--r); color: var(--text);
    font-family: 'DM Serif Display', serif; font-style: italic;
    font-size: 14px; line-height: 1.8; padding: 12px 14px;
    resize: none; height: 130px; outline: none; transition: border-color 0.15s;
  }
  #reflexion-text:focus { border-color: var(--accent3); }
  .reflexion-save { margin-top: 10px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .streak-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .streak-day {
    width: 26px; height: 26px; border-radius: 5px;
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted);
    cursor: pointer; transition: background 0.1s;
  }
  .streak-day.on { background: rgba(200,169,126,0.2); border-color: var(--accent); color: var(--accent); }

  .empty { color: var(--muted); font-size: 13px; font-style: italic; padding: 12px 0 4px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 820px) {
    main { grid-template-columns: 1fr; }
    .sidebar { grid-column: 1; grid-row: auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Centro de <span>Comando</span></div>
  <span class="env-badge" id="env-badge">...</span>
  <div id="fecha"></div>
</header>

<main>
  <div class="panel" id="panel-inbox">
    <div class="panel-label">inbox mental</div>
    <div class="inbox-input-row">
      <input type="text" id="inbox-input" placeholder="Captura un pensamiento, idea o tarea…" autocomplete="off" />
      <select class="tag-select" id="inbox-tag">
        <option value="idea">idea</option>
        <option value="tarea">tarea</option>
        <option value="nota">nota</option>
      </select>
      <button class="primary" onclick="addInboxItem()">+ Agregar</button>
    </div>
    <div class="inbox-list" id="inbox-list"></div>
  </div>

  <div class="panel" id="panel-prioridades">
    <div class="panel-label">prioridades del día</div>
    <div class="prio-slots" id="prio-slots"></div>
  </div>

  <div class="sidebar">
    <div>
      <div class="panel-label">proyectos activos</div>
      <div id="proyectos-list"></div>
      <div class="add-proy-row">
        <input type="text" id="proy-input" placeholder="Nuevo proyecto…" />
        <select id="proy-status-sel">
          <option value="activo">activo</option>
          <option value="pausa">pausa</option>
          <option value="idea">idea</option>
        </select>
        <button onclick="addProyecto()" style="padding:7px 12px;font-size:13px;">+</button>
      </div>
    </div>

    <div style="border-top:1px solid var(--border)">
      <div class="panel-label">reflexión del día</div>
      <textarea id="reflexion-text" placeholder="¿Qué me llevo de hoy? ¿Qué quiero procesar?"></textarea>
      <div class="reflexion-save" id="reflexion-saved"></div>
    </div>

    <div style="border-top:1px solid var(--border)">
      <div class="panel-label">racha — últimos 14 días</div>
      <div class="streak-row" id="streak-row"></div>
    </div>
  </div>
</main>

<script>
// ── UTILS ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function hoy() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtHora(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

// ── FECHA + ENV ───────────────────────────────────────────
const DIAS  = ['dom','lun','mar','mié','jue','vie','sáb'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
(async function() {
  const d = new Date();
  $('fecha').textContent = `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${d.getFullYear()}`;

  const env = await api('GET', '/env');
  const badge = $('env-badge');
  badge.textContent = env.env;
  badge.className = `env-badge ${env.env}`;
})();

// ── INBOX ─────────────────────────────────────────────────
let inbox = [];

async function loadInbox() {
  inbox = await api('GET', '/api/inbox');
  renderInbox();
}

function renderInbox() {
  const list = $('inbox-list');
  if (!inbox.length) { list.innerHTML = '<div class="empty">Sin capturas aún.</div>'; return; }
  list.innerHTML = inbox.map(item => `
    <div class="inbox-item ${item.procesado ? 'procesado' : ''}">
      <div class="tag-dot ${item.tag}"></div>
      <div class="text">${escHtml(item.text)}</div>
      <span class="ts">${fmtHora(item.ts)}</span>
      <div class="inbox-actions">
        ${!item.procesado ? `<button class="danger-btn" onclick="procesarInbox(${item.id})">✓</button>` : ''}
        <button class="danger-btn" onclick="eliminarInbox(${item.id})">✕</button>
      </div>
    </div>
  `).join('');
}

async function addInboxItem() {
  const input = $('inbox-input');
  const text = input.value.trim();
  if (!text) return;
  const item = await api('POST', '/api/inbox', { text, tag: $('inbox-tag').value });
  inbox.unshift(item);
  input.value = '';
  renderInbox();
}

async function procesarInbox(id) {
  await api('PATCH', `/api/inbox/${id}`, { procesado: true });
  const item = inbox.find(i => i.id === id);
  if (item) item.procesado = true;
  renderInbox();
}

async function eliminarInbox(id) {
  await api('DELETE', `/api/inbox/${id}`);
  inbox = inbox.filter(i => i.id !== id);
  renderInbox();
}

$('inbox-input').addEventListener('keydown', e => { if (e.key === 'Enter') addInboxItem(); });

// ── PRIORIDADES ───────────────────────────────────────────
let prios = [];
const HOY = hoy();

async function loadPrios() {
  prios = await api('GET', `/api/prioridades/${HOY}`);
  renderPrios();
}

function renderPrios() {
  $('prio-slots').innerHTML = prios.map((p, i) => `
    <div class="prio-slot ${p.done ? 'done' : ''}">
      <span class="prio-num">${i+1}</span>
      <input class="prio-input" type="text" value="${escAttr(p.text)}" placeholder="Prioridad ${i+1}…"
        oninput="updatePrioText(${i}, this.value)" />
      <button class="prio-check ${p.done ? 'done' : ''}" onclick="togglePrio(${i})"></button>
    </div>
  `).join('');
}

let prioTimer;
function updatePrioText(i, val) {
  prios[i].text = val;
  clearTimeout(prioTimer);
  prioTimer = setTimeout(() => api('PUT', `/api/prioridades/${HOY}`, prios), 600);
}

async function togglePrio(i) {
  prios[i].done = !prios[i].done;
  await api('PUT', `/api/prioridades/${HOY}`, prios);
  renderPrios();
}

// ── PROYECTOS ─────────────────────────────────────────────
let proyectos = [];

async function loadProyectos() {
  proyectos = await api('GET', '/api/proyectos');
  renderProyectos();
}

function renderProyectos() {
  const list = $('proyectos-list');
  if (!proyectos.length) { list.innerHTML = '<div class="empty">Sin proyectos registrados.</div>'; return; }
  list.innerHTML = proyectos.map(p => `
    <div class="proyecto-item">
      <span class="proyecto-nombre">${escHtml(p.nombre)}</span>
      <span class="proy-status ${p.status}">${p.status}</span>
      <button class="danger-btn" onclick="eliminarProy(${p.id})">✕</button>
    </div>
  `).join('');
}

async function addProyecto() {
  const input = $('proy-input');
  const nombre = input.value.trim();
  if (!nombre) return;
  const item = await api('POST', '/api/proyectos', { nombre, status: $('proy-status-sel').value });
  proyectos.push(item);
  input.value = '';
  renderProyectos();
}

async function eliminarProy(id) {
  await api('DELETE', `/api/proyectos/${id}`);
  proyectos = proyectos.filter(p => p.id !== id);
  renderProyectos();
}

$('proy-input').addEventListener('keydown', e => { if (e.key === 'Enter') addProyecto(); });

// ── REFLEXIÓN ─────────────────────────────────────────────
async function loadReflexion() {
  const r = await api('GET', `/api/reflexion/${HOY}`);
  $('reflexion-text').value = r.text || '';
}

let reflexTimer;
$('reflexion-text').addEventListener('input', () => {
  clearTimeout(reflexTimer);
  $('reflexion-saved').textContent = '';
  reflexTimer = setTimeout(async () => {
    await api('PUT', `/api/reflexion/${HOY}`, { text: $('reflexion-text').value });
    $('reflexion-saved').textContent = `guardado a las ${fmtHora(Date.now())}`;
  }, 900);
});

// ── STREAK ────────────────────────────────────────────────
let streak = [];

async function loadStreak() {
  streak = await api('GET', '/api/streak');
  renderStreak();
}

function renderStreak() {
  const row = $('streak-row');
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const on = streak.includes(key);
    days.push(`<div class="streak-day ${on?'on':''}" onclick="toggleStreak('${key}')">${d.getDate()}</div>`);
  }
  row.innerHTML = days.join('');
}

async function toggleStreak(key) {
  const idx = streak.indexOf(key);
  if (idx === -1) streak.push(key); else streak.splice(idx, 1);
  await api('PUT', '/api/streak', streak);
  renderStreak();
}

// ── INIT ──────────────────────────────────────────────────
Promise.all([loadInbox(), loadPrios(), loadProyectos(), loadReflexion(), loadStreak()]);
</script>
</body>
</html>
