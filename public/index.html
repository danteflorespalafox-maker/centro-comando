<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Comando</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161617;
    --bg3: #1e1e20;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e6e0;
    --muted: #6e6c67;
    --accent: #c8a97e;
    --accent2: #7a9e8a;
    --accent3: #9b7fb5;
    --danger: #b56060;
    --r: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ENV BADGE */
  .env-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
  }
  .env-badge.development { color: #7a9e8a; border-color: rgba(122,158,138,0.3); background: rgba(122,158,138,0.08); }
  .env-badge.production  { color: #c8a97e; border-color: rgba(200,169,126,0.3); background: rgba(200,169,126,0.08); }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .logo span { color: var(--accent); font-style: italic; }
  #fecha {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-left: auto;
  }

  main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 62px);
  }

  .col-main { background: var(--bg); display: flex; flex-direction: column; }
  .sidebar   { background: var(--bg2); display: flex; flex-direction: column; gap: 1px; }
  .sidebar > div { background: var(--bg2); padding: 24px; }

  .panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  input[type="text"], textarea {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  input[type="text"]::placeholder, textarea::placeholder { color: var(--muted); }

  button {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 13px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
  }
  button:hover { background: var(--bg3); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #1a140a; font-weight: 600; }
  button.primary:hover { opacity: 0.88; }
  button.icon-btn { background: transparent; border: none; color: var(--muted); padding: 4px 6px; font-size: 13px; line-height: 1; }
  button.icon-btn:hover { color: var(--danger); background: transparent; }
  button.icon-btn.confirm:hover { color: var(--accent2); }

  /* ── IDEA ACTIVA ─────────────────────────────────────── */
  #activa-banner {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }
  .activa-empty {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }
  .activa-card {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    background: var(--bg2);
    border: 1px solid rgba(200,169,126,0.25);
    border-radius: var(--r);
    padding: 16px 20px;
  }
  .activa-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 7px;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(200,169,126,0.5);
  }
  .activa-info { flex: 1; }
  .activa-nombre {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--text);
    line-height: 1.3;
  }
  .activa-desc {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .activa-actions { display: flex; gap: 6px; align-items: center; }

  /* ── CAPTURA ─────────────────────────────────────────── */
  #capture-section {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
  }
  .capture-form { display: flex; flex-direction: column; gap: 8px; }
  .capture-row { display: flex; gap: 8px; }
  .capture-row input { flex: 1; }
  #capture-desc { resize: none; height: 60px; font-size: 13px; }

  /* ── IDEAS LIST ──────────────────────────────────────── */
  #ideas-section { padding: 24px 32px; flex: 1; }

  .estado-group { margin-bottom: 28px; }
  .estado-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .estado-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .estado-count {
    background: var(--bg3);
    border-radius: 20px;
    padding: 1px 7px;
    font-size: 10px;
    color: var(--muted);
  }

  .idea-card {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 6px;
    transition: border-color 0.15s;
    animation: fadeIn 0.2s ease;
  }
  .idea-card:hover { border-color: var(--border2); }
  .idea-card.activa { border-color: rgba(200,169,126,0.2); }
  .idea-card.archivada { opacity: 0.45; }

  .estado-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .estado-dot.incubando { background: var(--accent3); }
  .estado-dot.activa    { background: var(--accent); box-shadow: 0 0 6px rgba(200,169,126,0.4); }
  .estado-dot.archivada { background: var(--muted); }

  .idea-body { flex: 1; min-width: 0; }
  .idea-nombre { font-size: 14px; font-weight: 500; color: var(--text); }
  .idea-desc   { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .idea-ts     { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 4px; }

  .idea-actions { display: flex; gap: 2px; align-items: flex-start; flex-shrink: 0; }

  .estado-select {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    padding: 3px 6px;
    cursor: pointer;
    outline: none;
    font-family: 'DM Mono', monospace;
  }
  .estado-select:focus { border-color: var(--accent); }

  .empty { color: var(--muted); font-size: 13px; font-style: italic; padding: 8px 0; }

  /* ── SIDEBAR ─────────────────────────────────────────── */
  #reflexion-text {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 14px;
    line-height: 1.8;
    padding: 12px 14px;
    resize: none;
    height: 120px;
    outline: none;
    transition: border-color 0.15s;
  }
  #reflexion-text:focus { border-color: var(--accent3); }
  .reflexion-save { margin-top: 8px; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .streak-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .streak-day {
    width: 26px; height: 26px; border-radius: 5px;
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted);
    cursor: pointer; transition: background 0.1s;
  }
  .streak-day.on { background: rgba(200,169,126,0.2); border-color: var(--accent); color: var(--accent); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 820px) {
    main { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Centro de <span>Comando</span></div>
  <span class="env-badge" id="env-badge">...</span>
  <div id="fecha"></div>
</header>

<main>
  <div class="col-main">

    <!-- Idea activa -->
    <div id="activa-banner">
      <div class="panel-label">idea activa</div>
      <div id="activa-content"><div class="activa-empty">Sin idea activa — elegí una de la lista para enfocarte.</div></div>
    </div>

    <!-- Captura rápida -->
    <div id="capture-section">
      <div class="panel-label">captura una idea</div>
      <div class="capture-form">
        <div class="capture-row">
          <input type="text" id="capture-nombre" placeholder="Nombre de la idea…" autocomplete="off" />
          <button class="primary" onclick="captureIdea()">+ Capturar</button>
        </div>
        <textarea id="capture-desc" placeholder="Descripción corta (opcional)…"></textarea>
      </div>
    </div>

    <!-- Lista de ideas -->
    <div id="ideas-section">
      <div id="ideas-incubando" class="estado-grupo"></div>
      <div id="ideas-archivadas" class="estado-grupo"></div>
    </div>

  </div>

  <div class="sidebar">
    <div style="border-bottom:1px solid var(--border)">
      <div class="panel-label">reflexión del día</div>
      <textarea id="reflexion-text" placeholder="¿Qué aprendí hoy sobre mis ideas?"></textarea>
      <div class="reflexion-save" id="reflexion-saved"></div>
    </div>
    <div>
      <div class="panel-label">racha — últimos 14 días</div>
      <div class="streak-row" id="streak-row"></div>
    </div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);

function hoy() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtFecha(ts) {
  const d = new Date(ts);
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

// ── FECHA + ENV ───────────────────────────────────────────
const DIAS  = ['dom','lun','mar','mié','jue','vie','sáb'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
(async function() {
  const d = new Date();
  $('fecha').textContent = `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${d.getFullYear()}`;
  const env = await api('GET', '/env');
  const badge = $('env-badge');
  badge.textContent = env.env;
  badge.className = `env-badge ${env.env}`;
})();

// ── IDEAS ─────────────────────────────────────────────────
let ideas = [];

async function loadIdeas() {
  ideas = await api('GET', '/api/ideas');
  renderAll();
}

function renderAll() {
  renderActiva();
  renderIdeas();
}

function renderActiva() {
  const activa = ideas.find(i => i.estado === 'activa');
  const el = $('activa-content');
  if (!activa) {
    el.innerHTML = '<div class="activa-empty">Sin idea activa — elegí una de la lista para enfocarte.</div>';
    return;
  }
  el.innerHTML = `
    <div class="activa-card">
      <div class="activa-dot"></div>
      <div class="activa-info">
        <div class="activa-nombre">${escHtml(activa.nombre)}</div>
        ${activa.descripcion ? `<div class="activa-desc">${escHtml(activa.descripcion)}</div>` : ''}
      </div>
      <div class="activa-actions">
        <button class="icon-btn confirm" title="Archivar" onclick="cambiarEstado(${activa.id}, 'archivada')">✓ Completar</button>
        <button class="icon-btn" title="Mover a incubación" onclick="cambiarEstado(${activa.id}, 'incubando')">↓ Incubar</button>
      </div>
    </div>
  `;
}

function renderIdeas() {
  const incubando = ideas.filter(i => i.estado === 'incubando');
  const archivadas = ideas.filter(i => i.estado === 'archivada');

  renderGrupo('ideas-incubando', 'en incubación', incubando);
  renderGrupo('ideas-archivadas', 'archivadas', archivadas);
}

function renderGrupo(containerId, label, lista) {
  const el = $(containerId);
  if (!lista.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="estado-group">
      <div class="estado-header">
        ${label}
        <span class="estado-count">${lista.length}</span>
      </div>
      ${lista.map(idea => `
        <div class="idea-card ${idea.estado}">
          <div class="estado-dot ${idea.estado}"></div>
          <div class="idea-body">
            <div class="idea-nombre">${escHtml(idea.nombre)}</div>
            ${idea.descripcion ? `<div class="idea-desc">${escHtml(idea.descripcion)}</div>` : ''}
            <div class="idea-ts">${fmtFecha(idea.ts)}</div>
          </div>
          <div class="idea-actions">
            ${idea.estado === 'incubando' ? `<button class="icon-btn confirm" title="Activar" onclick="activar(${idea.id})">▶ Activar</button>` : ''}
            ${idea.estado === 'archivada' ? `<button class="icon-btn" title="Reactivar" onclick="cambiarEstado(${idea.id}, 'incubando')">↺</button>` : ''}
            <button class="icon-btn" title="Eliminar" onclick="eliminarIdea(${idea.id})">✕</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

async function captureIdea() {
  const nombre = $('capture-nombre').value.trim();
  if (!nombre) return;
  const descripcion = $('capture-desc').value.trim();
  const idea = await api('POST', '/api/ideas', { nombre, descripcion });
  ideas.unshift(idea);
  $('capture-nombre').value = '';
  $('capture-desc').value = '';
  renderAll();
}

async function activar(id) {
  const yaActiva = ideas.find(i => i.estado === 'activa');
  if (yaActiva) {
    await api('PATCH', `/api/ideas/${yaActiva.id}`, { estado: 'incubando' });
    const idx = ideas.findIndex(i => i.id === yaActiva.id);
    if (idx !== -1) ideas[idx].estado = 'incubando';
  }
  await cambiarEstado(id, 'activa');
}

async function cambiarEstado(id, estado) {
  await api('PATCH', `/api/ideas/${id}`, { estado });
  const idx = ideas.findIndex(i => i.id === id);
  if (idx !== -1) ideas[idx].estado = estado;
  renderAll();
}

async function eliminarIdea(id) {
  await api('DELETE', `/api/ideas/${id}`);
  ideas = ideas.filter(i => i.id !== id);
  renderAll();
}

$('capture-nombre').addEventListener('keydown', e => { if (e.key === 'Enter') captureIdea(); });

// ── REFLEXIÓN ─────────────────────────────────────────────
const HOY = hoy();

async function loadReflexion() {
  const r = await api('GET', `/api/reflexion/${HOY}`);
  $('reflexion-text').value = r.text || '';
}

let reflexTimer;
$('reflexion-text').addEventListener('input', () => {
  clearTimeout(reflexTimer);
  $('reflexion-saved').textContent = '';
  reflexTimer = setTimeout(async () => {
    await api('PUT', `/api/reflexion/${HOY}`, { text: $('reflexion-text').value });
    const d = new Date();
    $('reflexion-saved').textContent = `guardado ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }, 900);
});

// ── STREAK ────────────────────────────────────────────────
let streak = [];

async function loadStreak() {
  streak = await api('GET', '/api/streak');
  renderStreak();
}

function renderStreak() {
  const row = $('streak-row');
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const on = streak.includes(key);
    days.push(`<div class="streak-day ${on?'on':''}" onclick="toggleStreak('${key}')">${d.getDate()}</div>`);
  }
  row.innerHTML = days.join('');
}

async function toggleStreak(key) {
  const idx = streak.indexOf(key);
  if (idx === -1) streak.push(key); else streak.splice(idx, 1);
  await api('PUT', '/api/streak', streak);
  renderStreak();
}

// ── INIT ──────────────────────────────────────────────────
Promise.all([loadIdeas(), loadReflexion(), loadStreak()]);
</script>
</body>
</html>
